server:
  port: 8080

spring:
  application:
    name: gateway-service
  config:
    import: 'optional:nacos:gateway-service.yml'
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.171.135:8848
        namespace:
      config:
        server-addr: 192.168.171.135:8848
        file-extension: yml
    gateway:
      discovery:
        locator:
          enabled: false
      httpclient:
        response-timeout: 60s
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: "*"
            allowed-methods: "*"
            allowed-headers: "*"
            max-age: 3600
    sentinel:
      enabled: false
      transport:
        dashboard: 192.168.171.135:8858
      eager: true
  data:
    redis:
      host: 192.168.171.135
      port: 6379
      password: redis123

sa-token:
  token-name: Authorization
  timeout: 2592000
  is-concurrent: true
  token-style: uuid
  jwt-secret-key: aiplanner-jwt-secret-key-2024
