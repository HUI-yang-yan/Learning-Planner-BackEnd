server:
  port: 8084

spring:
  application:
    name: reminder-service
  config:
    import: 'optional:nacos:reminder-service.yml'
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.171.135:3306/ai_platform?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: '123456'
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.171.135:8848
      config:
        server-addr: 192.168.171.135:8848
        file-extension: yml
    openfeign:
      client:
        config:
          task-service:
            url: http://192.168.171.135:8083
  quartz:
    job-store-type: memory
    properties:
      org.quartz.scheduler.instanceName: ReminderScheduler
      org.quartz.threadPool.threadCount: 5

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

sa-token:
  token-name: Authorization
  timeout: 2592000
  is-concurrent: true
  token-style: uuid
  jwt-secret-key: aiplanner-jwt-secret-key-2024
